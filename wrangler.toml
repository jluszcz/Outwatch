name = "outwatch"
main = "src/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm run build"

[assets]
directory = "public"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "outwatch"
database_id = "8a43f7b3-c34e-4a40-ae00-58204c016d9a"
migrations_dir = "migrations"
